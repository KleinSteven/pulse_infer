name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  build-and-test:
    name: ${{ matrix.os }} / Debug
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set Linux compiler
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "CC=gcc-13" >> "$GITHUB_ENV"
          echo "CXX=g++-13" >> "$GITHUB_ENV"

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DPULSE_BUILD_TESTS=ON
          -DPULSE_BUILD_CUDA=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DPULSE_BUILD_TESTS=ON
          -DPULSE_BUILD_CUDA=OFF

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: cmake --build build --config Debug

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Debug

      - name: Test (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: ctest --test-dir build --build-config Debug --output-on-failure --parallel 4

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build --build-config Debug --output-on-failure --parallel 4

  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        shell: bash
        run: |
          git ls-files -z '*.h' '*.hpp' '*.c' '*.cc' '*.cpp' '*.cxx' '*.cu' '*.cuh' \
            | xargs -0 -r clang-format --dry-run --Werror
